services:
  postgres:
    image: postgres:16-alpine
    container_name: splitwise-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: splitwise
      POSTGRES_PASSWORD: splitwise
      POSTGRES_DB: splitwise
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U splitwise -d splitwise"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
